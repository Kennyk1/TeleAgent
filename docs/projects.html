<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Projects — TeleAgent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#050510;--card:#0d0d20;--border:rgba(123,97,255,0.1);--border2:rgba(255,255,255,0.06);--purple:#7B61FF;--cyan:#00D4FF;--text:#e8e8ff;--muted:#5a5a8a;--green:#00ff88;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;display:none;backdrop-filter:blur(4px);}
.drawer-overlay.show{display:block;}
.drawer{position:fixed;top:0;left:-260px;width:260px;height:100%;background:#0a0a1e;border-right:1px solid var(--border);z-index:160;transition:left 0.28s ease;display:flex;flex-direction:column;}
.drawer.open{left:0;}
.drawer-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drawer-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.drawer-logo-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--purple),var(--cyan));display:flex;align-items:center;justify-content:center;}
.drawer-close{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.drawer-links{flex:1;overflow-y:auto;padding:8px;}
.drawer-links::-webkit-scrollbar{display:none;}
.drawer-link{display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:all 0.15s;border:none;background:none;font-family:'Syne',sans-serif;width:100%;cursor:pointer;}
.drawer-link:hover,.drawer-link.active{background:rgba(123,97,255,0.08);color:var(--text);}
.drawer-link.active{color:var(--purple);}
.drawer-bottom{padding:12px;border-top:1px solid var(--border);}
.drawer-user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.03);}
.drawer-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.drawer-user-info{flex:1;min-width:0;}
.drawer-user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drawer-user-plan{font-size:10px;color:var(--muted);}
.drawer-logout{width:28px;height:28px;border-radius:6px;background:transparent;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(5,5,16,0.97);border-bottom:1px solid var(--border);}
.nav-menu{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-title{font-size:14px;font-weight:700;flex:1;}
.nav-right{display:flex;gap:8px;}
.nav-btn{padding:7px 14px;border-radius:7px;background:linear-gradient(135deg,var(--purple),#9b85ff);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;}
.content{max-width:600px;margin:0 auto;padding:20px 14px 40px;}

/* GITHUB CONNECT */
.connect-card{background:linear-gradient(135deg,rgba(123,97,255,0.06),rgba(0,212,255,0.03));border:1px solid rgba(123,97,255,0.2);border-radius:14px;padding:28px;text-align:center;margin-bottom:16px;}
.connect-icon{width:56px;height:56px;border-radius:14px;background:rgba(123,97,255,0.1);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
.connect-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.connect-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.btn-purple{padding:12px 28px;border-radius:8px;background:linear-gradient(135deg,var(--purple),#9b85ff);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat{background:rgba(123,97,255,0.06);border:1px solid rgba(123,97,255,0.15);border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--purple);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}

/* PROJECT CARDS */
.section-title{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:border-color 0.2s;}
.project-card:hover{border-color:rgba(123,97,255,0.3);}
.project-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.project-icon{width:36px;height:36px;border-radius:9px;background:rgba(123,97,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.project-info{flex:1;min-width:0;}
.project-name{font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.project-desc{font-size:12px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.private-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(255,193,7,0.1);color:#ffc107;flex-shrink:0;}
.project-links{display:flex;gap:8px;flex-wrap:wrap;}
.project-link{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:5px;transition:opacity 0.15s;}
.project-link:active{opacity:0.7;}
.pl-github{background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--muted);}
.pl-pages{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);color:var(--cyan);}
.pl-lang{background:rgba(123,97,255,0.08);border:1px solid rgba(123,97,255,0.15);color:var(--purple);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.spinner-wrap{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--purple);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-logo"><div class="drawer-logo-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>TeleAgent</div>
    <div class="drawer-close" onclick="closeDrawer()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
  </div>
  <div class="drawer-links">
    <a href="chat.html" class="drawer-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a>
    <a href="agent.html" class="drawer-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Agent</a>
    <a href="projects.html" class="drawer-link active"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="7" height="7" rx="1"/><rect x="15" y="3" width="7" height="7" rx="1"/><rect x="2" y="14" width="7" height="7" rx="1"/><rect x="15" y="14" width="7" height="7" rx="1"/></svg>Projects</a>
    <a href="settings.html" class="drawer-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    <a href="upgrade.html" class="drawer-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Upgrade</a>
  </div>
  <div class="drawer-bottom">
    <div class="drawer-user-row">
      <div class="drawer-avatar" id="drawerAvatar">?</div>
      <div class="drawer-user-info"><div class="drawer-user-name" id="drawerName">...</div><div class="drawer-user-plan" id="drawerPlan">free</div></div>
      <button class="drawer-logout" onclick="logout()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</div>

<nav>
  <div class="nav-menu" onclick="openDrawer()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
  <div class="nav-title">Projects</div>
  <div class="nav-right">
    <a href="chat.html" class="nav-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Project
    </a>
  </div>
</nav>

<div class="content" id="content">
  <div class="spinner-wrap"><div class="spinner"></div>Loading...</div>
</div>

<script>
const API = 'https://sample-api-1-ryj7.onrender.com';
const token = localStorage.getItem('ta_token');
if (!token) window.location.href = 'login.html';

function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('show');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('show');}

async function api(ep){
  return (await fetch(`${API}${ep}`,{headers:{'Authorization':`Bearer ${token}`}})).json();
}

async function connectGithub(){
  const r=await fetch(`${API}/api/ta/github/connect`,{headers:{'Authorization':`Bearer ${token}`}});
  const d=await r.json();
  if(d.url)window.location.href=d.url;
}

async function load(){
  const [me, status] = await Promise.all([
    api('/api/ta/me'),
    api('/api/ta/github/status')
  ]);

  if(!me.success){logout();return;}
  const u=me.user;
  document.getElementById('drawerName').textContent=u.name;
  document.getElementById('drawerPlan').textContent=u.plan+' plan';
  document.getElementById('drawerAvatar').textContent=u.name[0].toUpperCase();

  const content=document.getElementById('content');

  if(!status.connected){
    content.innerHTML=`
      <div class="connect-card">
        <div class="connect-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="1.8" stroke-linecap="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg></div>
        <div class="connect-title">Connect GitHub</div>
        <div class="connect-sub">Connect your GitHub account to create repos, build websites and deploy apps automatically.</div>
        <button class="btn-purple" onclick="connectGithub()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          Connect GitHub
        </button>
      </div>`;
    return;
  }

  const projects=status.repos||[];
  const langs=[...new Set(projects.map(p=>p.language||'').filter(Boolean))];

  content.innerHTML=`
    <div class="stats-row">
      <div class="stat"><div class="stat-num">${projects.length}</div><div class="stat-label">Repos</div></div>
      <div class="stat"><div class="stat-num">@${status.username}</div><div class="stat-label">GitHub</div></div>
      <div class="stat"><div class="stat-num">${langs.length}</div><div class="stat-label">Languages</div></div>
    </div>
    <div class="section-title">Your Repositories</div>
    ${projects.length ? projects.map(p=>`
      <div class="project-card">
        <div class="project-top">
          <div class="project-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
          <div class="project-info">
            <div class="project-name">${p.name}</div>
            <div class="project-desc">${p.description||'No description'}</div>
          </div>
          ${p.private?'<span class="private-tag">Private</span>':''}
        </div>
        <div class="project-links">
          <a href="${p.url}" target="_blank" class="project-link pl-github">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            GitHub
          </a>
          <a href="${p.pages_url}" target="_blank" class="project-link pl-pages">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Live Site
          </a>
          ${p.language?`<span class="project-link pl-lang">${p.language}</span>`:''}
        </div>
      </div>`).join('')
    : '<div class="empty"><div class="empty-icon">📁</div><div>No repos yet.</div><div style="margin-top:8px;font-size:12px;">Go to Chat and ask AI to create one!</div></div>'}`;

  // Check GitHub callback
  const params=new URLSearchParams(window.location.search);
  if(params.get('github')==='connected'){window.history.replaceState({},'','projects.html');location.reload();}
}

function logout(){localStorage.removeItem('ta_token');localStorage.removeItem('ta_user');window.location.href='login.html';}
load();
</script>
</body>
</html>
